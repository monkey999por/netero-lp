<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Netero</title>
<meta name="robots" content="noindex">
<!-- ルートは【リロードのたびに】アリーナをランダムに切り替える（直前と同じにはしない）。
     各アリーナLPは /<slug>/ で常時直アクセス可能。ここは振り分けだけ。
     JS 無効時はメタリフレッシュで ai-earn にフォールバック。 -->
<meta http-equiv="refresh" content="0; url=/ai-earn/">
<style>
  html,body{height:100%;margin:0}
  body{background:#050507;color:#9a9aa8;display:flex;align-items:center;justify-content:center;
    font-family:"Inter","Noto Sans JP",system-ui,sans-serif;font-size:.9rem}
  a{color:#ff9a3c;text-decoration:none;font-weight:700}
</style>
</head>
<body>
  <p>今週のアリーナへ移動中… <a href="/ai-earn/">移動しない場合はこちら</a></p>
  <script>
    // リロードのたびにアリーナをランダムに変える。アリーナを足したらここに slug を追加するだけ。
    var ARENAS = ["ai-earn", "shikaku", "indie", "juken"];
    var last = null;
    try { last = localStorage.getItem("netero_arena"); } catch (e) {}
    var pool = ARENAS.filter(function (a) { return a !== last; }); // 直前と同じは避ける
    if (!pool.length) pool = ARENAS;
    var slug = pool[Math.floor(Math.random() * pool.length)];
    try { localStorage.setItem("netero_arena", slug); } catch (e) {}
    location.replace("/" + slug + "/");
  </script>
</body>
</html>
