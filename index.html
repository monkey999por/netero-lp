<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Netero</title>
<meta name="robots" content="noindex">
<!-- ルートは ISO 週番号でアリーナを1週ごとにローテーション（末尾まで行くと先頭に戻ってループ）。
     各アリーナLPは /<slug>/ で常時直アクセス可能。ここは振り分けだけ。
     JS 無効時はメタリフレッシュで先頭アリーナ(ai-earn)にフォールバック。 -->
<meta http-equiv="refresh" content="0; url=/ai-earn/">
<style>
  html,body{height:100%;margin:0}
  body{background:#050507;color:#9a9aa8;display:flex;align-items:center;justify-content:center;
    font-family:"Inter","Noto Sans JP",system-ui,sans-serif;font-size:.9rem}
  a{color:#ff9a3c;text-decoration:none;font-weight:700}
</style>
</head>
<body>
  <p>今週のアリーナへ移動中… <a href="/ai-earn/">移動しない場合はこちら</a></p>
  <script>
    // ローテ順（末尾→先頭でループ）。アリーナを足したらここに slug を追加するだけ。
    var ARENAS = ["ai-earn", "shikaku", "indie", "juken"];
    // ISO 8601 週番号（月曜始まり）
    function isoWeek(d){
      var t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      var day = t.getUTCDay() || 7;            // 月=1..日=7
      t.setUTCDate(t.getUTCDate() + 4 - day);  // その週の木曜へ
      var yearStart = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
      return Math.ceil((((t - yearStart) / 86400000) + 1) / 7);
    }
    var slug = ARENAS[(isoWeek(new Date()) - 1) % ARENAS.length];
    location.replace("/" + slug + "/");
  </script>
</body>
</html>
